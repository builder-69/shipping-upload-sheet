<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>롯데택배 통합주문서 생성기</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap");

  :root {
    --bg: #f5f4f0;
    --surface: #fff;
    --border: #e2e0d8;
    --border-strong: #c8c5ba;
    --text: #1a1916;
    --muted: #6b6860;
    --accent: #2d5016;
    --accent-bg: #eef4e8;
    --error: #6b1010;
    --error-bg: #fff0f0;
    --success: #1a4d0a;
    --radius: 12px;
    --sans: "Noto Sans KR", sans-serif;
    --mono: "JetBrains Mono", monospace;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
  }
  header {
    height: 60px;
    padding: 0 28px;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header strong { font-size: 16px; }
  header span { font-size: 12px; opacity: .72; }
  main { max-width: 920px; margin: 0 auto; padding: 30px 22px 64px; }
  .panel {
    padding: 26px;
    margin-bottom: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 2px 10px rgba(0, 0, 0, .04);
  }
  .panel-title { display: flex; align-items: center; gap: 10px; margin: 0 0 20px; font-size: 16px; }
  .step {
    height: 27px;
    width: 27px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 12px;
  }
  .upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .upload {
    position: relative;
    min-height: 138px;
    padding: 24px 14px 14px;
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius);
    background: #fafaf8;
    text-align: center;
    transition: border-color .15s, background .15s;
  }
  .upload.active, .upload.dragging { border-color: var(--accent); background: var(--accent-bg); }
  .upload input {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }
  .shop { margin-bottom: 8px; font-size: 14px; font-weight: 700; }
  .hint { color: var(--muted); font-size: 12px; }
  .filename {
    min-height: 18px;
    margin-top: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--accent);
    font: 11px var(--mono);
  }
  .actions { display: flex; justify-content: center; }
  button {
    min-width: 250px;
    padding: 14px 28px;
    border: 0;
    border-radius: var(--radius);
    background: var(--accent);
    color: white;
    font: 700 15px var(--sans);
    cursor: pointer;
  }
  button:disabled { cursor: wait; opacity: .5; }
  #progress, #error, #result { display: none; }
  #progress { margin-top: 20px; text-align: center; color: var(--muted); font-size: 13px; }
  .bar { height: 8px; margin-bottom: 10px; overflow: hidden; border-radius: 10px; background: var(--border); }
  .bar::after {
    display: block;
    width: 42%;
    height: 100%;
    content: "";
    background: var(--accent);
    animation: loading 1s ease-in-out infinite alternate;
  }
  @keyframes loading { from { transform: translateX(0); } to { transform: translateX(138%); } }
  #error {
    margin-top: 18px;
    padding: 12px 15px;
    color: var(--error);
    background: var(--error-bg);
    border-radius: var(--radius);
    font-size: 13px;
  }
  .counts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .count {
    padding: 15px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: center;
  }
  .count label { display: block; margin-bottom: 5px; font-size: 11px; color: var(--muted); }
  .count strong { font: 700 25px var(--mono); }
  .count:first-child strong { color: var(--success); }
  #downloadBtn { width: 100%; }
  @media (max-width: 680px) {
    .upload-grid, .counts { grid-template-columns: 1fr; }
    header { padding: 0 18px; }
  }
</style>
</head>
<body>
<header>
  <strong>롯데택배 통합주문서 생성기</strong>
  <span>Python FastAPI processing</span>
</header>
<main>
  <section class="panel">
    <h2 class="panel-title"><span class="step">1</span> 주문서 파일 업로드</h2>
    <div class="upload-grid">
      <label class="upload" id="naverCard">
        <input type="file" id="naverFile" accept=".csv,.xlsx,.xls,.zip">
        <div class="shop">파일 1</div>
        <div class="hint">모든 플랫폼 주문서 가능</div>
        <div class="filename" id="naverName"></div>
      </label>
      <label class="upload" id="hyberCard">
        <input type="file" id="hyberFile" accept=".csv,.xlsx,.xls,.zip">
        <div class="shop">파일 2</div>
        <div class="hint">모든 플랫폼 주문서 가능</div>
        <div class="filename" id="hyberName"></div>
      </label>
      <label class="upload" id="ablyCard">
        <input type="file" id="ablyFile" accept=".csv,.xlsx,.xls,.zip">
        <div class="shop">파일 3</div>
        <div class="hint">모든 플랫폼 주문서 가능</div>
        <div class="filename" id="ablyName"></div>
      </label>
    </div>
  </section>

  <section class="panel">
    <h2 class="panel-title"><span class="step">2</span> 통합주문서 생성</h2>
    <div class="actions"><button type="button" id="generateBtn">통합주문서 생성하기</button></div>
    <div id="progress" role="status">
      <div class="bar"></div>
      업로드 파일을 서버에서 처리하고 있습니다.
    </div>
    <div id="error" role="alert"></div>
  </section>

  <section class="panel" id="result">
    <h2 class="panel-title"><span class="step">3</span> 생성 완료</h2>
    <div class="counts">
      <div class="count"><label>전체 주문</label><strong id="totalCount">0</strong></div>
      <div class="count"><label>네이버</label><strong id="naverCount">0</strong></div>
      <div class="count"><label>하이버</label><strong id="hyberCount">0</strong></div>
      <div class="count"><label>에이블리</label><strong id="ablyCount">0</strong></div>
    </div>
    <button type="button" id="downloadBtn">통합주문서 다운로드 (XLSX)</button>
  </section>
</main>
<script>
  const API_BASE = "https://shipping-upload-sheet.onrender.com";
  const API_URL = `${API_BASE}/api/generate`;
  const platforms = ["naver", "hyber", "ably"];
  const files = { naver: null, hyber: null, ably: null };
  let resultUrl = null;
  let resultFilename = "통합주문서.xlsx";

  platforms.forEach((platform) => {
    const input = document.getElementById(`${platform}File`);
    const card = document.getElementById(`${platform}Card`);
    input.addEventListener("change", () => setFile(platform, input.files[0]));
    card.addEventListener("dragover", (event) => {
      event.preventDefault();
      card.classList.add("dragging");
    });
    card.addEventListener("dragleave", () => card.classList.remove("dragging"));
    card.addEventListener("drop", (event) => {
      event.preventDefault();
      card.classList.remove("dragging");
      setFile(platform, event.dataTransfer.files[0]);
    });
  });

  function setFile(platform, file) {
    if (!file) return;
    files[platform] = file;
    document.getElementById(`${platform}Card`).classList.add("active");
    document.getElementById(`${platform}Name`).textContent = file.name;
  }

  document.getElementById("generateBtn").addEventListener("click", async () => {
    const error = document.getElementById("error");
    error.style.display = "none";
    if (!platforms.some((platform) => files[platform])) {
      showError("최소 1개의 주문서 파일을 업로드해주세요.");
      return;
    }

    const formData = new FormData();
    platforms.forEach((platform) => {
      if (files[platform]) formData.append(`${platform}_file`, files[platform]);
    });

    const button = document.getElementById("generateBtn");
    document.getElementById("result").style.display = "none";
    document.getElementById("progress").style.display = "block";
    button.disabled = true;

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        body: formData
      });
      if (!response.ok) {
        const responseBody = await response.text();
        let message = responseBody;
        try {
          const errorData = JSON.parse(responseBody);
          message = errorData.message || errorData.detail || responseBody;
        } catch (error) {
          // Keep plain-text backend or proxy errors readable in the UI.
        }
        throw new Error(message || `통합주문서 생성에 실패했습니다. (${response.status})`);
      }
      if (resultUrl) URL.revokeObjectURL(resultUrl);
      resultUrl = URL.createObjectURL(await response.blob());
      resultFilename = getFilename(response.headers.get("Content-Disposition"));
      showResult(response.headers);
    } catch (exception) {
      showError(exception.message);
    } finally {
      document.getElementById("progress").style.display = "none";
      button.disabled = false;
    }
  });

  document.getElementById("downloadBtn").addEventListener("click", () => {
    if (!resultUrl) return;
    const link = document.createElement("a");
    link.href = resultUrl;
    link.download = resultFilename;
    link.click();
  });

  function showResult(headers) {
    document.getElementById("totalCount").textContent = headers.get("X-Total-Orders") || "-";
    document.getElementById("naverCount").textContent = headers.get("X-Naver-Orders") || "-";
    document.getElementById("hyberCount").textContent = headers.get("X-Hyber-Orders") || "-";
    document.getElementById("ablyCount").textContent = headers.get("X-Ably-Orders") || "-";
    document.getElementById("result").style.display = "block";
  }

  function showError(message) {
    const error = document.getElementById("error");
    error.textContent = message;
    error.style.display = "block";
  }

  function getFilename(disposition) {
    if (!disposition) return "통합주문서.xlsx";
    const utf8Match = disposition.match(/filename\*=utf-8''([^;]+)/i);
    if (utf8Match) return decodeURIComponent(utf8Match[1]);
    const match = disposition.match(/filename="?([^";]+)"?/i);
    return match ? match[1] : "통합주문서.xlsx";
  }
</script>
</body>
</html>
